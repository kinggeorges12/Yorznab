services:

  yorznab:
    image: python:3.11-slim
    container_name: yorznab
    user: "1000:1000" # Optional, user:group
    environment:
      - TZ=UTC # Set your local timezone for accurate cron schedules
      - HOME=/tmp # Python installation directory, change to /home for root user
      - PYTHONUNBUFFERED=1 # Real-time logging
      - CONFIG_DIR=/app/config # Edit these files in config directory: config.yaml, yorznab.yaml
      - LOG_DIR=/logs # Default is the temp directory
      - LOG_LEVEL=INFO # Set logging level (default=DEBUG): DEBUG, INFO, WARNING, ERROR, CRITICAL (no logs)
      # Optional feed configuration: add as many feed files as you want, separated by commas
      #- FEEDS=private.yaml,public.yaml # [optional] Comma-separated list of feed files in the config directory (default=feed.yaml)
    ports:
      - "9116:9116" # Default port 9116
    extra_hosts:
      - "host.docker.internal:host-gateway" # Expose Yorznab to other containers
    volumes:
      # Only for root user to persist Python installation
      # - /path/to/yorznab/python:/home
      # Logging server output
      - type: bind
        source: /path/to/yorznab/logs
        target: /logs
      # Writing Yorznab API Keys to keys.yaml
      - type: bind
        source: /path/to/yorznab/app/config
        target: /app/config
      # Running the Python web server and cron job
      - type: bind
        source: /path/to/yorznab/app/server
        target: /app/server
        read_only: true
    command: >
        bash -c "
        export PYTHONPATH=/app;
        export PATH=\"$$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:$$PATH\";
        cd /app/server &&
        pip install --user --upgrade pip &&
        pip install --user -r requirements.txt &&
        pip install --user termios &&
        python -m uvicorn run:app --host 0.0.0.0 --port 9116;"
    healthcheck:
      test: ["CMD-SHELL", "python -c 'import http.client; conn = http.client.HTTPConnection(\"localhost\", 9116); conn.request(\"GET\", \"/status\"); r = conn.getresponse(); exit(0 if r.status < 400 else 1)'"]
      start_period: 20s
      interval: 300s
      timeout: 15s
      retries: 10
    restart: unless-stopped